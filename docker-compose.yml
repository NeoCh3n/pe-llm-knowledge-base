version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pe-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - ./qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: pe-memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pe_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: pe-memory-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/pe-memory-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j_data:/data
